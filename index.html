<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kevin Tumusiime | Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a',
                        secondary: '#1e293b',
                        accent: '#818cf8',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-primary text-slate-50 font-sans leading-relaxed scroll-smooth">

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 bg-primary/80 backdrop-blur-md border-b border-white/10 py-4">
        <ul class="flex justify-center gap-8 list-none flex-wrap px-5">
            <li><a href="#about" class="text-slate-400 font-medium hover:text-white transition">About</a></li>
            <li><a href="#education" class="text-slate-400 font-medium hover:text-white transition">Education</a></li>
            <li><a href="#experience" class="text-slate-400 font-medium hover:text-white transition">Experience</a></li>
            <li><a href="#skills" class="text-slate-400 font-medium hover:text-white transition">Skills</a></li>
        </ul>
    </nav>

    <!-- HERO SECTION -->
    <header class="min-h-screen flex flex-col justify-center items-center text-center px-5 bg-[radial-gradient(circle_at_50%_50%,rgba(129,140,248,0.15)_0%,transparent_50%)]">
        <h1 id="hero-name" class="text-5xl md:text-6xl font-extrabold bg-gradient-to-r from-white to-indigo-400 bg-clip-text text-transparent mb-2">Loading...</h1>
        <p id="hero-title" class="text-xl text-slate-400 mb-2">Loading...</p>
        <p id="hero-location" class="text-accent mb-8">Loading...</p>
        <div class="flex gap-4 flex-wrap justify-center">
            <a href="#" id="email-link" class="px-5 py-2 border border-white/10 rounded-full text-slate-50 hover:bg-accent hover:border-accent hover:text-white transition">✉️ Email</a>
            <a href="#" id="phone-link" class="px-5 py-2 border border-white/10 rounded-full text-slate-50 hover:bg-accent hover:border-accent hover:text-white transition">📞 Phone</a>
            <a href="https://linkedin.com" target="_blank" class="px-5 py-2 border border-white/10 rounded-full text-slate-50 hover:bg-accent hover:border-accent hover:text-white transition">💼 LinkedIn</a>
            <a href="https://github.com" target="_blank" class="px-5 py-2 border border-white/10 rounded-full text-slate-50 hover:bg-accent hover:border-accent hover:text-white transition">💻 GitHub</a>
        </div>
    </header>

    <main>
        <!-- ABOUT -->
        <section id="about" class="max-w-4xl mx-auto py-20 px-5">
            <h2 class="text-3xl font-bold mb-10 relative inline-block after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-1 after:bg-accent after:rounded-full">Professional Profile</h2>
            <p id="about-text" class="text-lg text-slate-400 leading-relaxed">Loading...</p>
        </section>

        <!-- EDUCATION -->
        <section id="education" class="max-w-4xl mx-auto py-20 px-5">
            <h2 class="text-3xl font-bold mb-10 relative inline-block after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-1 after:bg-accent after:rounded-full">Education</h2>
            <div id="education-container" class="relative pl-8 border-l-2 border-white/10"></div>
        </section>

        <!-- EXPERIENCE -->
        <section id="experience" class="max-w-4xl mx-auto py-20 px-5">
            <h2 class="text-3xl font-bold mb-10 relative inline-block after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-1 after:bg-accent after:rounded-full">Experience & Leadership</h2>
            <div id="experience-container" class="relative pl-8 border-l-2 border-white/10"></div>
        </section>

        <!-- SKILLS -->
        <section id="skills" class="max-w-4xl mx-auto py-20 px-5">
            <h2 class="text-3xl font-bold mb-10 relative inline-block after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-12 after:h-1 after:bg-accent after:rounded-full">Technical Skills</h2>
            <div id="skills-container" class="flex flex-wrap gap-3"></div>
        </section>
    </main>

    <footer class="text-center py-10 text-slate-500 text-sm border-t border-white/10 mt-10">
        <p>&copy; 2025 Kevin Tumusiime. All rights reserved.</p>
    </footer>

    <!-- Your JS Logic -->
    <script src="script.js"></script>
</body>
</html>
